<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium, interactive Etch a Sketch web application featuring customizable grid resolutions, dynamic drawing modes, color pickers, shading, and smooth micro-animations.">
    <title>Etch a Sketch | Modern Alpha Edition</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="./images/etch.ico" type="image/x-icon">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Faster+One&family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="app-header">
            <div class="logo-container">
                <img src="./images/etch.png" alt="Etch a Sketch Logo" class="app-logo" onerror="this.style.display='none'">
                <h1>Etch a Sketch <span class="badge">PRO</span></h1>
            </div>
            <p class="subtitle">Experience the classic drawing toy with state-of-the-art web capabilities</p>
        </header>

        <main class="main-content">
            <div class="etch-casing" id="etchCasing">
                <!-- Top Brand Banner on Casing -->
                <div class="casing-banner">
                    <span class="gold-text">MAGIC</span> ETCH A SKETCH SCREEN
                </div>

                <!-- Main Layout: Controls Left/Top + Screen Right/Center -->
                <div class="casing-body">
                    <!-- Control Panel -->
                    <aside class="controls-panel" aria-label="Drawing Tools and Grid Controls">
                        <!-- Mode Selection -->
                        <div class="control-group" role="group" aria-labelledby="drawingToolsLabel">
                            <span class="group-label" id="drawingToolsLabel">Drawing Tools</span>
                            <div class="tools-grid">
                                <button type="button" class="btn tool-btn active" id="colorBtn" data-mode="color" title="Standard Solid Color">
                                    <span class="btn-icon" aria-hidden="true">🎨</span>
                                    <span class="btn-text">Color</span>
                                </button>
                                <button type="button" class="btn tool-btn" id="rainbowBtn" data-mode="rainbow" title="Random Rainbow Colors">
                                    <span class="btn-icon" aria-hidden="true">🌈</span>
                                    <span class="btn-text">Rainbow</span>
                                </button>
                                <button type="button" class="btn tool-btn" id="shaderBtn" data-mode="shader" title="Progressive Pencil Shading (10% darker each pass)">
                                    <span class="btn-icon" aria-hidden="true">✏️</span>
                                    <span class="btn-text">Shader</span>
                                </button>
                                <button type="button" class="btn tool-btn" id="eraserBtn" data-mode="eraser" title="Erase tiles back to canvas color">
                                    <span class="btn-icon" aria-hidden="true">🧹</span>
                                    <span class="btn-text">Eraser</span>
                                </button>
                            </div>
                        </div>

                        <!-- Color Picker & Interaction Mode -->
                        <div class="control-group" role="group" aria-labelledby="brushSettingsLabel">
                            <span class="group-label" id="brushSettingsLabel">Brush Settings</span>
                            <div class="brush-settings">
                                <div class="color-picker-wrapper">
                                    <label for="colorPicker" class="sub-label">Color:</label>
                                    <input type="color" id="colorPicker" value="#1a1a1a" title="Choose brush color">
                                    <span id="colorHex" class="color-hex">#1A1A1A</span>
                                </div>
                                <div class="interaction-toggle">
                                    <span class="sub-label" id="drawModeLabel">Draw Mode:</span>
                                    <button type="button" class="btn toggle-btn" id="drawModeBtn" data-hover="true" aria-labelledby="drawModeLabel drawModeBtn" title="Toggle between Hover to Draw and Click & Drag">
                                        Hover Mode
                                    </button>
                                </div>
                                <div class="theme-toggle">
                                    <span class="sub-label" id="themeModeLabel">Canvas:</span>
                                    <button type="button" class="btn toggle-btn" id="themeBtn" data-theme="silver" aria-labelledby="themeModeLabel themeBtn" title="Toggle between Retro Silver and Neon Midnight canvas themes">
                                        Retro Silver
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Grid Size Controls -->
                        <div class="control-group">
                            <div class="group-header">
                                <label class="group-label" for="gridSlider">Grid Resolution</label>
                                <span class="grid-size-display" id="gridSizeLabel">16 x 16</span>
                            </div>
                            <input type="range" id="gridSlider" min="4" max="64" value="16" step="2" class="slider" aria-label="Grid Size Slider">
                            <div class="quick-size-buttons" role="group" aria-label="Quick Resolution Presets">
                                <button type="button" class="btn size-btn" data-size="8">8x8</button>
                                <button type="button" class="btn size-btn active" data-size="16">16x16</button>
                                <button type="button" class="btn size-btn" data-size="32">32x32</button>
                                <button type="button" class="btn size-btn" data-size="64">64x64</button>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="control-group action-group">
                            <button type="button" class="btn save-btn" id="saveBtn" title="Save your sketch to disk as a high-quality JPG image">
                                <span class="btn-icon" aria-hidden="true">💾</span>
                                <span class="btn-text">Save Sketch (JPG)</span>
                            </button>
                            <button type="button" class="btn clear-btn" id="clearBtn" title="Shake casing and clear drawing canvas">
                                <span class="btn-icon" aria-hidden="true">⚡</span>
                                <span class="btn-text">Shake & Clear</span>
                            </button>
                        </div>
                    </aside>

                    <!-- Drawing Screen Frame -->
                    <section class="screen-container">
                        <div class="screen-frame">
                            <div id="screen" class="screen" role="region" aria-label="Etch a Sketch Drawing Canvas">
                                <!-- Grid tiles dynamically generated by JavaScript -->
                            </div>
                        </div>
                    </section>
                </div>

                <!-- Bottom Knobs -->
                <div class="knobs-container">
                    <div class="knob-wrapper">
                        <div class="knob knob-left" id="knobLeft" role="slider" tabindex="0" aria-label="Horizontal Control Knob" aria-valuemin="0" aria-valuemax="360" aria-valuenow="0" title="Left Knob (Horizontal) - Drag to turn or use left/right arrow keys">
                            <div class="knob-line"></div>
                        </div>
                        <span class="knob-label">HORIZONTAL</span>
                    </div>
                    <div class="knob-wrapper">
                        <div class="knob knob-right" id="knobRight" role="slider" tabindex="0" aria-label="Vertical Control Knob" aria-valuemin="0" aria-valuemax="360" aria-valuenow="0" title="Right Knob (Vertical) - Drag to turn or use up/down arrow keys">
                            <div class="knob-line"></div>
                        </div>
                        <span class="knob-label">VERTICAL</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <p>&copy; <span id="year">2026</span> Michael Hamilton. Modernized with high-performance web standards.</p>
        </footer>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
